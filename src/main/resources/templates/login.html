<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Log In - Fit Check</title>
</head>
<body>
<h1>Log in to Fit Check</h1>

<p th:if="${param.error}" style="color: red;">Invalid email or password.</p>
<p th:if="${param.logout}" style="color: green;">You have been logged out.</p>

<form th:action="@{/login}" method="post">
    <div>
        <label>Email:</label>
        <input type="email" name="username" required>
    </div>
    <div>
        <label>Password:</label>
        <input type="password" name="password" required>
    </div>
    <button type="submit">Log In</button>
</form>

<p>Don't have an account? <a th:href="@{/signup}">Sign up</a></p>
</body>
</html>
