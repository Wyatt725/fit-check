<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Upload - Fit Check</title>
</head>
<body>
<h1>Upload an Image</h1>

<p th:if="${param.error}" style="color: red;">Please choose a file.</p>

<form th:action="@{/upload}" method="post" enctype="multipart/form-data">
  <div>
    <label>Image:</label>
    <input type="file" name="file" accept="image/*" required>
  </div>
  <div>
    <label>Type:</label>
    <select name="type">
      <option value="PERSON">Photo of me</option>
      <option value="CLOTHING">Clothing item</option>
    </select>
  </div>
  <button type="submit">Upload</button>
</form>

<p><a th:href="@{/dashboard}">Back to dashboard</a></p>
</body>
</html>
