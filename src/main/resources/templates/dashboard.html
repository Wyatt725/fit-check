<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Fit Check</title>
</head>
<body>
<h1>Your Wardrobe</h1>
<p><a th:href="@{/upload}">Upload a new image</a></p>
<p>Logged in as <span th:text="${email}"></span></p>

<form th:action="@{/logout}" method="post">
    <button type="submit">Log Out</button>
</form>

<h2>Your Photos</h2>
<p th:if="${personPhotos.isEmpty()}">No photos uploaded yet.</p>
<div>
    <div th:each="img : ${personPhotos}" style="display:inline-block; margin:10px;">
        <img th:src="@{'/' + ${img.fileName}}" style="max-width:200px;">
        <p th:text="${img.originalName}"></p>
    </div>
</div>

<h2>Your Clothing</h2>
<p th:if="${clothingPhotos.isEmpty()}">No clothing uploaded yet.</p>
<div>
    <div th:each="img : ${clothingPhotos}" style="display:inline-block; margin:10px;">
        <img th:src="@{'/' + ${img.fileName}}" style="max-width:200px;">
        <p th:text="${img.originalName}"></p>
    </div>
</div>
</body>
</html>
